<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-4">
  <h1>📊 User Dashboard</h1>

  <div class="row mt-4">
    <div class="col-md-4">
      <div class="card p-3">
        <h4>❤️ Favorites</h4>
        <p id="favCount"></p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h4>👀 Viewed</h4>
        <p id="viewCount"></p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h4>🔍 Searches</h4>
        <p id="searchCount"></p>
      </div>
    </div>
  </div>

  <hr>

  <h3>Recent Searches</h3>
  <ul id="searchList"></ul>

  <h3>Viewed Movies</h3>
  <ul id="viewList"></ul>

</div>
<button onclick="clearData()" class="btn btn-danger mt-3">Clear Data</button>

<script src="dashboard.js"></script>

</body>
</html>
